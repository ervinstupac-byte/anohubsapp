<!doctype html>
<html lang="en">

<head>
  <!-- NC-76.3 EMERGENCY ERROR CAPTURE -->
  <script>
    window.onerror = function (msg, url, line, col, error) {
      // Don't alert on ResizeObserver loop limit exceeded
      if (msg && msg.includes('ResizeObserver')) return false;

      console.error('🚨 FATAL JS ERROR:', msg, 'at', url, line, col, error);

      // Update loader text if visible
      var loaderText = document.getElementById('loader-text');
      if (loaderText) {
        loaderText.innerHTML = '<span style="color:#EF4444">CRITICAL BOOT ERROR: ' + msg.substring(0, 50) + '...</span>';
      }
      return false;
    };
    console.log('[index.html] ✅ Error handler installed');
  </script>

  <meta charset="UTF-8" />
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AnoHUB | Command Center</title>
  <meta name="description" content="Dynamic Risk vs Operational Certainty. The Architects of Immunity.">
  <meta name="theme-color" content="#020617">

  <!-- Relative path for Vite dev/build compatibility -->
  <!-- <link rel="stylesheet" href="./src/index.css"> -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

</head>

<body>
  <div id="root">
    <!-- Inline loading screen (removed when React mounts) -->
    <div id="initial-loader"
      style="position: fixed; inset: 0; background: #020617; display: flex; align-items: center; justify-content: center; z-index: 9999;">
      <div style="text-align: center; font-family: 'Inter', sans-serif;">
        <div style="color: #22D3EE; font-size: 12px; font-weight: 700; letter-spacing: 0.3em; margin-bottom: 16px;">
          ANOHUB</div>
        <div
          style="width: 200px; height: 2px; background: #0F172A; border-radius: 999px; overflow: hidden; margin: 0 auto;">
          <div id="loader-bar"
            style="height: 100%; background: #22D3EE; width: 0%; animation: loading 2.5s ease-in-out infinite;">
          </div>
        </div>
        <div id="loader-text" style="color: #64748B; font-size: 10px; margin-top: 16px; letter-spacing: 0.2em;">
          INITIALIZING NEURAL
          CORE...</div>
      </div>
    </div>
    <style>
      @keyframes loading {
        0% {
          width: 0%;
        }

        50% {
          width: 70%;
        }

        100% {
          width: 100%;
        }
      }
    </style>
  </div>

  <!-- Main React Bundle -->
  <script type="module" src="./src/main.tsx"></script>

  <!-- NC-76.3 KILL-SWITCH: Force-hide loader after 3 seconds regardless of JS state -->
  <script>
    console.log('[index.html] ⏱️  Kill-switch armed (3s timeout)');
    setTimeout(function () {
      // Check if React has mounted (root should have content)
      var root = document.getElementById('root');
      var loader = document.getElementById('initial-loader');

      // If loader is still there...
      if (loader) {
        console.warn('[index.html] ⚠️  KILL-SWITCH CHECK: Loader still present after 3s');

        // Hide and remove loader to avoid blocking interaction
        try {
          loader.style.display = 'none';
          if (loader.parentNode) loader.parentNode.removeChild(loader);
        } catch (e) { console.warn('[index.html] Failed to remove loader element', e); }

        // If Root appears empty, append a non-destructive emergency banner rather than replacing the whole body
        if (!root || root.children.length === 0 || (root.children.length === 1 && root.children[0].id === 'initial-loader')) {
          console.error('[index.html] 🚨 REACT MOUNT FAILED - showing emergency banner');

          var banner = document.createElement('div');
          banner.id = 'emergency-banner';
          banner.style.position = 'fixed';
          banner.style.left = '16px';
          banner.style.right = '16px';
          banner.style.bottom = '16px';
          banner.style.zIndex = 10000;
          banner.style.background = '#0B1220';
          banner.style.color = '#E2E8F0';
          banner.style.padding = '12px 16px';
          banner.style.border = '1px solid #1E293B';
          banner.style.borderRadius = '8px';
          banner.style.boxShadow = '0 6px 24px rgba(2,6,23,0.6)';

          banner.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
              <div style="flex:1">
                <strong style="color:#F97316">SYSTEM BOOT WARNING</strong>
                <div style="font-size:12px;opacity:0.85;margin-top:6px;">React did not mount in time. Check Console (F12) for errors. You may continue to interact with the page.</div>
              </div>
              <div style="margin-left:12px;">
                <button id="dismiss-emergency" style="background:#0F172A;color:#60A5FA;border:1px solid #1E293B;padding:6px 10px;border-radius:6px;cursor:pointer;">Dismiss</button>
              </div>
            </div>
          `;

          document.body.appendChild(banner);
          document.getElementById('dismiss-emergency')?.addEventListener('click', function () { banner.remove(); });
        }
      } else {
        console.log('[index.html] ✅ Boot successful (Loader removed)');
      }
    }, 3000);
  </script>
</body>

</html>
